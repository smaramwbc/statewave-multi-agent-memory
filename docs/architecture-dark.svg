  <text x="36" y="424" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#9ca3af">Bloomberg committed Stripe at 3.5% + 35c.  TechCrunch committed Stripe at 2.9% + 30c.  Statewave compiler detected Jaccard word-overlap &gt;= 0.6 → marked Bloomberg SUPERSEDED.</text>
